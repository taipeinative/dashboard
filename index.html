<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Anime Journal Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Personal tracker</p>
          <h1>Anime Journal</h1>
        </div>
        <div class="header-actions">
          <button
            id="add-anime-top"
            type="button"
            class="icon-button"
            aria-label="Add new anime"
            title="Add new anime"
          ></button>
          <button
            id="theme-toggle"
            type="button"
            class="icon-button"
            aria-label="Toggle theme"
            title="Toggle theme"
          ></button>
        </div>
      </header>
      <main id="app" class="page-host" aria-live="polite"></main>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
